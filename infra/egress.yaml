# LiveKit Egress config — records rooms to HLS in MinIO.
# "One pipeline, both outputs": the agent publishes one WebRTC track;
# LiveKit serves it live AND Egress writes HLS segments to object storage
# where the evidence MCP can index them.

api_key: ${LIVEKIT_API_KEY}
api_secret: ${LIVEKIT_API_SECRET}
ws_url: ws://livekit:7880

# Recorded HLS lands in the same MinIO bucket the evidence MCP reads.
s3:
  access_key: ${MINIO_ROOT_USER}
  secret: ${MINIO_ROOT_PASSWORD}
  region: us-east-1
  endpoint: http://minio:9000
  bucket: catchattack-evidence
  force_path_style: true

logging:
  level: info
