[mypy]
python_version = 3.12
strict = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True
check_untyped_defs = True
exclude = (^legacy/|^\.venv/)

[mypy-tests.*]
disallow_untyped_defs = False

# pysigma + its backend packages do not declare __all__ / py.typed.
# Treat them as untyped at module boundary.
[mypy-sigma.*]
ignore_missing_imports = True
implicit_reexport = True
disallow_untyped_calls = False

# fastmcp's middleware module exports symbols we use generically.
[mypy-fastmcp.*]
implicit_reexport = True

# sentence-transformers ships no type stubs and is an optional extra.
[mypy-sentence_transformers]
ignore_missing_imports = True
ignore_errors = True
